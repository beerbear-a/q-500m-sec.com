<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Ungrateful Dog Lab. — Shinichi Arita (@Beerbear_A)">
  <title>Ungrateful Dog Lab.</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,300&family=Inter:wght@300&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #ffffff;
      --accent: #a7e8f6;
      --text: #42403d;
      --muted: rgba(66,64,61,0.36);
      --border: rgba(66,64,61,0.1);
    }

    html, body { height: 100%; }

    body {
      font-family: 'Cormorant Garamond', Georgia, serif;
      background: var(--bg);
      color: var(--text);
      font-weight: 300;
      -webkit-font-smoothing: antialiased;
      display: flex;
      flex-direction: column;
    }

    #hero {
      flex: 1;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100svh;
      overflow: hidden;
    }

    #signal-canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
    }

    .hero-title {
      position: relative;
      z-index: 1;
      font-size: clamp(1.25rem, 4vw, 2.75rem);
      font-weight: 300;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      white-space: nowrap;
      color: var(--text);
      opacity: 0;
      animation: up 1.2s cubic-bezier(0.22,1,0.36,1) forwards 0.2s;
    }

    footer {
      border-top: 1px solid var(--border);
      padding: 2.75rem 2.5rem;
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: end;
      gap: 2rem;
    }

    .footer-identity { display: flex; flex-direction: column; gap: 0.3rem; }

    .footer-name {
      font-size: 1.125rem;
      font-weight: 300;
      letter-spacing: 0.04em;
      color: var(--text);
    }

    .footer-meta {
      font-family: 'Inter', sans-serif;
      font-size: 0.625rem;
      font-weight: 300;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .footer-links { display: flex; gap: 1.5rem; align-items: center; }

    .footer-link {
      font-size: 0.875rem;
      font-weight: 300;
      font-style: italic;
      color: var(--muted);
      text-decoration: none;
      letter-spacing: 0.04em;
      transition: color 0.2s;
      position: relative;
    }
    .footer-link::after {
      content: '';
      position: absolute;
      bottom: -2px; left: 0; right: 0;
      height: 1px;
      background: var(--accent);
      transform: scaleX(0);
      transform-origin: left;
      transition: transform 0.25s ease;
    }
    .footer-link:hover { color: var(--text); }
    .footer-link:hover::after { transform: scaleX(1); }

    .footer-copy {
      grid-column: 1 / -1;
      border-top: 1px solid var(--border);
      padding-top: 1.5rem;
      font-family: 'Inter', sans-serif;
      font-size: 0.5625rem;
      font-weight: 300;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted);
    }

    @keyframes up { to { opacity: 1; transform: none; } }

    @media (max-width: 520px) {
      .hero-title { letter-spacing: 0.12em; white-space: normal; text-align: center; line-height: 1.15; }
      footer { grid-template-columns: 1fr; align-items: start; padding: 2rem 1.5rem; }
    }
  </style>
</head>
<body>

  <section id="hero">
    <canvas id="signal-canvas" aria-hidden="true"></canvas>
    <h1 class="hero-title">Ungrateful Dog Lab.</h1>
  </section>

  <footer>
    <div class="footer-identity">
      <span class="footer-name">Shinichi Arita</span>
      <span class="footer-meta">ex:Beerbear &nbsp;/&nbsp; DJ &nbsp;/&nbsp; Dev</span>
    </div>
    <nav class="footer-links">
      <a href="https://x.com/Beerbear_A" class="footer-link" target="_blank" rel="noopener noreferrer">X</a>
      <a href="https://note.com/beerbear_a" class="footer-link" target="_blank" rel="noopener noreferrer">Note</a>
    </nav>
    <p class="footer-copy">&copy; 2025 Ungrateful Dog Lab.</p>
  </footer>

  <script>
    const canvas = document.getElementById('signal-canvas');
    const ctx    = canvas.getContext('2d');

    // Colour tokens (rgb arrays)
    const ACCENT = [167, 232, 246];
    const DARK   = [66,  64,  61];

    let W, H;
    function resize() {
      W = canvas.width  = canvas.offsetWidth;
      H = canvas.height = canvas.offsetHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    // ── Complex audio-signal waveform ───────────────────────────────
    // Superposition of harmonics, like a real synthesised audio signal.
    function signal(phase) {
      return (
        Math.sin(phase)            * 0.50 +
        Math.sin(phase * 2 + 0.8) * 0.20 +
        Math.sin(phase * 3 - 0.3) * 0.12 +
        Math.sin(phase * 5 + 1.1) * 0.06 +
        Math.sin(phase * 7 - 0.6) * 0.03
      );
    }

    // ── Wave definitions ─────────────────────────────────────────────
    // Two waves: one below center (main, accent), one above (ghost, dark)
    const waves = [
      // Main wave — accent colour, below centre
      {
        yFrac:  0.68,
        ampFrac: 0.055,   // amplitude as fraction of H
        freqX:  0.022,    // spatial frequency (cycles per px)
        speed:  0.38,     // phase advance per second
        rgb:    ACCENT,
        alpha:  0.48,
        width:  1.0,
      },
      // Ghost wave — dark colour, above centre
      {
        yFrac:  0.30,
        ampFrac: 0.028,
        freqX:  0.014,
        speed:  0.22,
        rgb:    DARK,
        alpha:  0.10,
        width:  0.75,
      },
    ];

    // ── Beat markers (vertical tick lines) ──────────────────────────
    // Occasional thin vertical lines, like bar markers in a DAW timeline.
    const markers = [];
    let nextMarker = 0;

    function spawnMarker(t) {
      const x = Math.random() * W;
      const useAccent = Math.random() < 0.6;
      markers.push({ x, born: t, life: 1.4, rgb: useAccent ? ACCENT : DARK });
    }

    // ── Draw ─────────────────────────────────────────────────────────
    function draw(t) {
      const sec = t / 1000;

      ctx.clearRect(0, 0, W, H);

      // Waveforms
      waves.forEach(w => {
        const cy  = H * w.yFrac;
        const amp = H * w.ampFrac;
        // Slow amplitude "breath" — makes it feel alive
        const breath = 0.82 + 0.18 * Math.sin(sec * 0.4 + w.yFrac * 10);

        ctx.beginPath();
        ctx.strokeStyle = `rgba(${w.rgb.join(',')},${w.alpha})`;
        ctx.lineWidth   = w.width;
        ctx.lineJoin    = 'round';
        ctx.lineCap     = 'round';

        for (let x = 0; x <= W; x += 1) {
          const phase = x * w.freqX + sec * w.speed;
          const y     = cy + signal(phase) * amp * breath;
          x === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
        }
        ctx.stroke();
      });

      // Spawn beat markers occasionally
      if (sec > nextMarker) {
        spawnMarker(sec);
        nextMarker = sec + 1.8 + Math.random() * 2.5;
      }

      // Draw and age markers
      for (let i = markers.length - 1; i >= 0; i--) {
        const m = markers[i];
        const age = sec - m.born;
        if (age > m.life) { markers.splice(i, 1); continue; }

        const progress = age / m.life;
        // Fade in then out
        const a = progress < 0.1
          ? progress / 0.1
          : 1 - (progress - 0.1) / 0.9;

        ctx.strokeStyle = `rgba(${m.rgb.join(',')},${0.22 * a})`;
        ctx.lineWidth   = 0.75;
        ctx.beginPath();
        ctx.moveTo(m.x, 0);
        ctx.lineTo(m.x, H);
        ctx.stroke();
      }
    }

    function loop(t) {
      draw(t);
      requestAnimationFrame(loop);
    }
    requestAnimationFrame(loop);
  </script>

</body>
</html>
