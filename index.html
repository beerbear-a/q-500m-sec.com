<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Ungrateful Dog Lab. — Shinichi Arita (@Beerbear_A)">
  <title>Ungrateful Dog Lab.</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Inter:wght@300&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #ffffff;
      --accent: #a7e8f6;
      --text: #42403d;
      --muted: rgba(66,64,61,0.38);
      --border: rgba(66,64,61,0.1);
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Cormorant Garamond', Georgia, serif;
      background: var(--bg);
      color: var(--text);
      font-weight: 300;
      -webkit-font-smoothing: antialiased;
    }

    /* Nav */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      height: 50px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(255,255,255,0.88);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
    }

    .nav-inner {
      width: 100%;
      max-width: 560px;
      padding: 0 1.75rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .nav-logo {
      font-family: 'Cormorant Garamond', serif;
      font-size: 0.9375rem;
      font-weight: 300;
      letter-spacing: 0.02em;
      color: var(--text);
      text-decoration: none;
    }

    .nav-links {
      display: flex;
      gap: 1.75rem;
      list-style: none;
    }

    .nav-links a {
      font-family: 'Inter', sans-serif;
      font-size: 0.625rem;
      font-weight: 300;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted);
      text-decoration: none;
      transition: color 0.2s;
    }
    .nav-links a:hover { color: var(--text); }

    /* Hero */
    #hero {
      min-height: 100svh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 6rem 1.75rem 4rem;
      gap: 0;
    }

    .hero-title {
      font-size: clamp(3rem, 12vw, 7rem);
      font-weight: 300;
      letter-spacing: -0.02em;
      line-height: 1.05;
      color: var(--text);
      opacity: 0;
      transform: translateY(14px);
      animation: up 1s cubic-bezier(0.22,1,0.36,1) forwards 0.1s;
    }

    .hero-rule {
      width: 28px;
      height: 1px;
      background: var(--accent);
      margin: 2.25rem auto;
      opacity: 0;
      animation: fade 0.6s ease forwards 0.75s;
    }

    .hero-sub {
      font-size: clamp(0.875rem, 2.5vw, 1rem);
      font-weight: 300;
      font-style: italic;
      color: var(--muted);
      letter-spacing: 0.03em;
      line-height: 1.9;
      opacity: 0;
      transform: translateY(8px);
      animation: up 0.7s cubic-bezier(0.22,1,0.36,1) forwards 0.9s;
    }

    /* Activities */
    #activities {
      max-width: 560px;
      margin: 0 auto;
      padding: 7rem 1.75rem 8rem;
    }

    .section-label {
      font-family: 'Inter', sans-serif;
      font-size: 0.6rem;
      font-weight: 300;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
      text-align: center;
      margin-bottom: 3rem;
    }

    .activity-list {
      list-style: none;
      border-top: 1px solid var(--border);
    }

    .activity-item {
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      padding: 1.25rem 0;
      opacity: 0;
      transform: translateY(8px);
      transition: opacity 0.55s cubic-bezier(0.22,1,0.36,1), transform 0.55s cubic-bezier(0.22,1,0.36,1);
    }
    .activity-item.is-visible { opacity: 1; transform: none; }

    .activity-name {
      font-size: clamp(1.25rem, 4vw, 1.625rem);
      font-weight: 300;
      letter-spacing: -0.01em;
      color: var(--text);
    }

    .activity-tag {
      font-family: 'Inter', sans-serif;
      font-size: 0.6rem;
      font-weight: 300;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
    }

    /* Footer */
    footer {
      border-top: 1px solid var(--border);
      padding: 2.5rem 1.75rem;
      text-align: center;
    }

    .footer-links {
      display: flex;
      justify-content: center;
      gap: 2rem;
      margin-bottom: 1.75rem;
    }

    .footer-link {
      font-size: 0.9375rem;
      font-weight: 300;
      font-style: italic;
      color: var(--text);
      text-decoration: none;
      border-bottom: 1px solid var(--border);
      padding-bottom: 1px;
      transition: border-color 0.2s;
    }
    .footer-link:hover { border-color: var(--accent); }

    .footer-copy {
      font-family: 'Inter', sans-serif;
      font-size: 0.6rem;
      font-weight: 300;
      letter-spacing: 0.1em;
      color: var(--muted);
    }

    @keyframes up   { to { opacity: 1; transform: none; } }
    @keyframes fade { to { opacity: 1; } }

    @media (max-width: 480px) {
      .nav-links { gap: 1.125rem; }
    }
  </style>
</head>
<body>

  <nav>
    <div class="nav-inner">
      <a href="#hero" class="nav-logo">Ungrateful Dog Lab.</a>
      <ul class="nav-links">
        <li><a href="#activities">Activities</a></li>
        <li><a href="#footer">Links</a></li>
      </ul>
    </div>
  </nav>

  <section id="hero">
    <h1 class="hero-title">Ungrateful<br>Dog Lab.</h1>
    <div class="hero-rule" aria-hidden="true"></div>
    <p class="hero-sub">
      @Beerbear_A &nbsp;&mdash;&nbsp; LIFE FEELS LIKE MUSIC<br>
      動物園巡りとポップカルチャー
    </p>
  </section>

  <section id="activities">
    <p class="section-label">Activities</p>
    <ul class="activity-list">
      <li class="activity-item">
        <span class="activity-name">X / Twitter</span>
        <span class="activity-tag">Daily</span>
      </li>
      <li class="activity-item">
        <span class="activity-name">Note</span>
        <span class="activity-tag">Writing</span>
      </li>
      <li class="activity-item">
        <span class="activity-name">DJ</span>
        <span class="activity-tag">Music</span>
      </li>
      <li class="activity-item">
        <span class="activity-name">Development</span>
        <span class="activity-tag">Dev</span>
      </li>
    </ul>
  </section>

  <footer id="footer">
    <div class="footer-links">
      <a href="https://x.com/Beerbear_A" class="footer-link" target="_blank" rel="noopener noreferrer">X</a>
      <a href="https://note.com/beerbear_a" class="footer-link" target="_blank" rel="noopener noreferrer">Note</a>
    </div>
    <p class="footer-copy">&copy; 2025 Ungrateful Dog Lab.</p>
  </footer>

  <script>
    const io = new IntersectionObserver((entries) => {
      entries.forEach((entry, _, arr) => {
        if (!entry.isIntersecting) return;
        const items = [...entry.target.parentElement.querySelectorAll('.activity-item')];
        const i = items.indexOf(entry.target);
        setTimeout(() => entry.target.classList.add('is-visible'), i * 70);
        io.unobserve(entry.target);
      });
    }, { threshold: 0.1 });

    document.querySelectorAll('.activity-item').forEach(el => io.observe(el));
  </script>

</body>
</html>
